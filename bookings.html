<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheSovereignBarber Bookings</title>

</head>

<body>

    <header>
        
        <div>
            <h1>The Sovereign Barber</h1>
        </div>

        <nav style="text-align: center; font-size: large;" >
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="services.html">Services</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    
    </header>

    <main>

     <section>

        <div>
            <h1>Book Your Appointment</h1>
        </div>

        <h3>
            Book your appointment with us and get the best haircut with 
            affordable prices. We are open from 9:00 AM to 8:00 PM. 
             We look forward to serving you!
        </h3>

        <form>

            <div>
                <div>
                    <h5>
                        NAME
                    </h5>

                    <input type="text" placeholder="enter your name">
                    
                </div>

                <div>
                    <h5>
                        EMAIL ADDRESS
                    </h5>

                    <input type="email" placeholder="enter your email address">

                    <div>
                        <h5>
                            PHONE NUMBER
                        </h5>

                        <input type="tel" placeholder="enter your phone number">
                    </div>

                    <div >
                        <h5>
                            APPOINTMENT TIME
                        </h5>

                        <div>
                            <select>
                                <option value="">SELECT TIME</option>
                                <option value="9:00 AM">9:00 AM</option>
                                <option value="10:00 AM">10:00 AM</option>
                                <option value="11:00 AM">11:00 AM</option>
                                <option value="12:00 PM">12:00 PM</option>
                                <option value="1:00 PM">1:00 PM</option>
                                <option value="2:00 PM">2:00 PM</option>
                                <option value="3:00 PM">3:00 PM</option>
                                <option value="4:00 PM">4:00 PM</option>
                                <option value="5:00 PM">5:00 PM</option>
                                <option value="6:00 PM">6:00 PM</option>
                                <option value="7:00 PM">7:00 PM</option>
                                <option value="8:00 PM">8:00 PM</option>
                            </select>
                        </div>
                    </div>

                    <br>
                    <button>
                        SUBMIT
                    </button>
            </div>
        
        </form>

     </section>

    </main>
</body>   



</html>
